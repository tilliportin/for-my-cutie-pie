<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sydän</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        to bottom,
        #fffafd,
        #fff3f8
    );
    font-family:Georgia, serif;
}

.card{
    position:relative;
    width:500px;
    max-width:90vw;
}

.heart{
    width:100%;
    filter:
        drop-shadow(0 12px 20px rgba(0,0,0,0.15))
        drop-shadow(0 0 25px rgba(255,120,180,0.25));
}

.heart svg{
    width:100%;
    height:auto;
    display:block;
}

.text{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    color:white;
    font-size:30px;
    line-height:1.4;

    text-shadow:
        0 2px 4px rgba(0,0,0,0.15);

    padding:80px;
}

.sparkle{
    position:absolute;
    color:white;
    font-size:28px;
    opacity:0;
    animation:twinkle 4s infinite;
}

.s1{
    top:40px;
    left:20px;
}

.s2{
    top:70px;
    right:30px;
    animation-delay:1s;
}

.s3{
    bottom:50px;
    left:40px;
    animation-delay:2s;
}

.s4{
    bottom:30px;
    right:50px;
    animation-delay:3s;
}

@keyframes twinkle{
    0%,100%{
        opacity:0;
        transform:scale(0.5);
    }
    50%{
        opacity:1;
        transform:scale(1.15);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="sparkle s1">✦</div>
    <div class="sparkle s2">✧</div>
    <div class="sparkle s3">✦</div>
    <div class="sparkle s4">✧</div>

    <div class="heart">
        <svg viewBox="0 0 512 512">
            <path
                fill="#ff9ccf"
                stroke="#c85a8d"
                stroke-width="12"
                d="M256 472
                C 80 340, 20 240, 20 140
                C 20 60, 80 20, 140 20
                C 200 20, 240 60, 256 95
                C 272 60, 312 20, 372 20
                C 432 20, 492 60, 492 140
                C 492 240, 432 340, 256 472 Z"/>
        </svg>
    </div>

    <div class="text">
        Sinä olet minulle tärkeä
    </div>

</div>

</body>
</html>
