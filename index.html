<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>3D-sydän</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                radial-gradient(
                    circle at center,
                    #3a1022 0%,
                    #170912 45%,
                    #050306 100%
                );

            font-family: Georgia, "Times New Roman", serif;
        }

        /* Tumma hohde taustalle */
        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background:
                radial-gradient(
                    circle at 50% 55%,
                    rgba(255, 30, 100, 0.16),
                    transparent 45%
                );

            animation: backgroundGlow 4s ease-in-out infinite;
            pointer-events: none;
        }

        .scene {
            position: relative;

            width: min(620px, 94vw);
            height: min(720px, 94vh);

            display: flex;
            justify-content: center;
            align-items: center;

            perspective: 1200px;
        }

        /* Liekkikerros */
        .flames {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .flame {
            position: absolute;
            bottom: -120px;

            width: 90px;
            height: 190px;

            border-radius:
                50% 50% 30% 30% /
                70% 70% 30% 30%;

            background:
                radial-gradient(
                    ellipse at center bottom,
                    #fff4ad 0%,
                    #ffbe3d 20%,
                    #ff5b22 48%,
                    #d91445 72%,
                    transparent 75%
                );

            filter:
                blur(2px)
                drop-shadow(0 0 20px rgba(255, 60, 20, 0.75));

            opacity: 0.75;

            transform-origin: center bottom;
            animation: flameMove 3.5s ease-in-out infinite;
        }

        .flame-1 {
            left: 3%;
            animation-delay: -0.2s;
            transform: scale(0.8);
        }

        .flame-2 {
            left: 17%;
            animation-delay: -1.5s;
            transform: scale(1.15);
        }

        .flame-3 {
            left: 35%;
            animation-delay: -2.3s;
            transform: scale(0.95);
        }

        .flame-4 {
            left: 53%;
            animation-delay: -0.9s;
            transform: scale(1.25);
        }

        .flame-5 {
            left: 70%;
            animation-delay: -1.9s;
            transform: scale(0.9);
        }

        .flame-6 {
            left: 84%;
            animation-delay: -2.8s;
            transform: scale(1.1);
        }

        .heart-card {
            position: relative;

            width: min(520px, 88vw);

            transform-style: preserve-3d;
            animation: heartFloat 5s ease-in-out infinite;

            z-index: 5;
        }

        .heart-shadow {
            position: absolute;

            left: 50%;
            bottom: -20px;

            width: 65%;
            height: 55px;

            transform: translateX(-50%);

            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;

            filter: blur(22px);
            opacity: 0.75;

            animation: shadowPulse 5s ease-in-out infinite;
        }

        .heart-svg {
            display: block;
            width: 100%;
            height: auto;

            filter:
                drop-shadow(0 18px 18px rgba(0, 0, 0, 0.6))
                drop-shadow(0 35px 42px rgba(0, 0, 0, 0.45))
                drop-shadow(0 0 28px rgba(255, 35, 105, 0.35));
        }

        .heart-text {
            position: absolute;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 110px 105px 80px;

            color: #fff5f8;

            text-align: center;
            font-size: clamp(22px, 4vw, 34px);
            line-height: 1.35;
            letter-spacing: 0.5px;

            text-shadow:
                0 2px 3px rgba(70, 0, 25, 0.8),
                0 0 10px rgba(255, 255, 255, 0.32),
                0 0 25px rgba(255, 50, 120, 0.35);

            z-index: 10;
        }

        .sparkle {
            position: absolute;

            color: #ffdce9;
            font-size: 28px;

            opacity: 0;

            text-shadow:
                0 0 8px white,
                0 0 16px #ff77aa;

            animation: sparkle 3.5s ease-in-out infinite;
        }

        .sparkle-1 {
            top: 12%;
            left: 8%;
        }

        .sparkle-2 {
            top: 21%;
            right: 5%;
            animation-delay: 1.1s;
        }

        .sparkle-3 {
            bottom: 14%;
            left: 10%;
            animation-delay: 2.1s;
        }

        .sparkle-4 {
            right: 11%;
            bottom: 19%;
            animation-delay: 2.8s;
        }

        .ember {
            position: absolute;
            bottom: -20px;

            width: 5px;
            height: 5px;

            border-radius: 50%;

            background: #ffcc70;

            box-shadow:
                0 0 8px #ff7a22,
                0 0 15px #ff2b40;

            animation: emberRise 5s linear infinite;
        }

        .ember-1 {
            left: 10%;
            animation-delay: 0s;
        }

        .ember-2 {
            left: 25%;
            animation-delay: 1.2s;
        }

        .ember-3 {
            left: 45%;
            animation-delay: 2.4s;
        }

        .ember-4 {
            left: 65%;
            animation-delay: 0.7s;
        }

        .ember-5 {
            left: 82%;
            animation-delay: 3.1s;
        }

        @keyframes heartFloat {
            0%,
            100% {
                transform:
                    translateY(0)
                    rotateX(3deg)
                    rotateY(-2deg)
                    scale(1);
            }

            50% {
                transform:
                    translateY(-16px)
                    rotateX(-2deg)
                    rotateY(2deg)
                    scale(1.025);
            }
        }

        @keyframes shadowPulse {
            0%,
            100% {
                transform: translateX(-50%) scaleX(1);
                opacity: 0.7;
            }

            50% {
                transform: translateX(-50%) scaleX(0.86);
                opacity: 0.48;
            }
        }

        @keyframes flameMove {
            0%,
            100% {
                transform:
                    translateY(0)
                    scaleX(0.9)
                    rotate(-3deg);
                opacity: 0.55;
            }

            35% {
                transform:
                    translateY(-35px)
                    scaleX(1.08)
                    rotate(5deg);
                opacity: 0.9;
            }

            70% {
                transform:
                    translateY(-18px)
                    scaleX(0.8)
                    rotate(-5deg);
                opacity: 0.7;
            }
        }

        @keyframes sparkle {
            0%,
            100% {
                opacity: 0;
                transform: scale(0.3) rotate(0deg);
            }

            50% {
                opacity: 1;
                transform: scale(1.25) rotate(25deg);
            }
        }

        @keyframes emberRise {
            0% {
                transform: translateY(0) translateX(0) scale(0.6);
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            100% {
                transform:
                    translateY(-720px)
                    translateX(45px)
                    scale(0);
                opacity: 0;
            }
        }

        @keyframes backgroundGlow {
            0%,
            100% {
                opacity: 0.65;
            }

            50% {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .heart-card {
                width: 96vw;
            }

            .heart-text {
                padding: 90px 75px 60px;
            }

            .flame {
                width: 65px;
                height: 145px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
            }
        }
    </style>
</head>

<body>

    <main class="scene">

        <div class="flames">
            <div class="flame flame-1"></div>
            <div class="flame flame-2"></div>
            <div class="flame flame-3"></div>
            <div class="flame flame-4"></div>
            <div class="flame flame-5"></div>
            <div class="flame flame-6"></div>

            <span class="ember ember-1"></span>
            <span class="ember ember-2"></span>
            <span class="ember ember-3"></span>
            <span class="ember ember-4"></span>
            <span class="ember ember-5"></span>
        </div>

        <div class="heart-card">

            <div class="heart-shadow"></div>

            <span class="sparkle sparkle-1">✦</span>
            <span class="sparkle sparkle-2">✧</span>
            <span class="sparkle sparkle-3">✦</span>
            <span class="sparkle sparkle-4">✧</span>

            <svg
                class="heart-svg"
                viewBox="0 0 600 560"
                xmlns="http://www.w3.org/2000/svg"
                aria-label="Vaaleanpunainen kolmiulotteinen sydän"
            >
                <defs>
                    <!-- Sydämen pääväri -->
                    <radialGradient
                        id="heartGradient"
                        cx="34%"
                        cy="24%"
                        r="78%"
                    >
                        <stop offset="0%" stop-color="#ffd5e7"/>
                        <stop offset="22%" stop-color="#ff9fc8"/>
                        <stop offset="52%" stop-color="#f55b9a"/>
                        <stop offset="78%" stop-color="#b81655"/>
                        <stop offset="100%" stop-color="#61072d"/>
                    </radialGradient>

                    <!-- Reunuksen tumma gradientti -->
                    <linearGradient
                        id="edgeGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%"
                    >
                        <stop offset="0%" stop-color="#9e174d"/>
                        <stop offset="50%" stop-color="#5d082c"/>
                        <stop offset="100%" stop-color="#2f0317"/>
                    </linearGradient>

                    <!-- Kiilto -->
                    <linearGradient
                        id="shineGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%"
                    >
                        <stop
                            offset="0%"
                            stop-color="#ffffff"
                            stop-opacity="0.85"
                        />

                        <stop
                            offset="55%"
                            stop-color="#ffffff"
                            stop-opacity="0.14"
                        />

                        <stop
                            offset="100%"
                            stop-color="#ffffff"
                            stop-opacity="0"
                        />
                    </linearGradient>

                    <!-- Sisäinen 3D-varjo -->
                    <filter
                        id="innerDepth"
                        x="-30%"
                        y="-30%"
                        width="160%"
                        height="160%"
                    >
                        <feGaussianBlur
                            in="SourceAlpha"
                            stdDeviation="15"
                            result="blur"
                        />

                        <feOffset
                            dx="12"
                            dy="18"
                            result="offsetBlur"
                        />

                        <feComposite
                            in="offsetBlur"
                            in2="SourceAlpha"
                            operator="out"
                            result="inverse"
                        />

                        <feFlood
                            flood-color="#310013"
                            flood-opacity="0.7"
                            result="color"
                        />

                        <feComposite
                            in="color"
                            in2="inverse"
                            operator="in"
                            result="shadow"
                        />

                        <feComposite
                            in="shadow"
                            in2="SourceGraphic"
                            operator="over"
                        />
                    </filter>
                </defs>

                <!-- Tumma paksu syvyyskerros -->
                <path
                    d="
                        M300 520
                        C265 488 86 374 47 232
                        C13 106 91 28 190 36
                        C245 40 280 74 300 111
                        C320 74 355 40 410 36
                        C509 28 587 106 553 232
                        C514 374 335 488 300 520Z
                    "
                    fill="url(#edgeGradient)"
                    transform="translate(0 16)"
                />

                <!-- Sydämen päämuoto -->
                <path
                    d="
                        M300 500
                        C265 468 86 354 47 212
                        C13 86 91 8 190 16
                        C245 20 280 54 300 91
                        C320 54 355 20 410 16
                        C509 8 587 86 553 212
                        C514 354 335 468 300 500Z
                    "
                    fill="url(#heartGradient)"
                    stroke="#701039"
                    stroke-width="9"
                    filter="url(#innerDepth)"
                />

                <!-- Vasemman yläosan kiilto -->
                <path
                    d="
                        M112 176
                        C115 83 197 47 253 83
                        C218 83 176 100 150 135
                        C129 163 121 197 126 226
                        C113 211 108 194 112 176Z
                    "
                    fill="url(#shineGradient)"
                    opacity="0.85"
                />

                <!-- Alareunan tumma syvyys -->
                <path
                    d="
                        M80 270
                        C138 367 255 447 300 487
                        C345 447 462 367 520 270
                        C486 389 351 471 300 514
                        C249 471 114 389 80 270Z
                    "
                    fill="#4c041f"
                    opacity="0.25"
                />

                <!-- Kevyt keskikiilto -->
                <ellipse
                    cx="230"
                    cy="150"
                    rx="72"
                    ry="34"
                    fill="#ffffff"
                    opacity="0.12"
                    transform="rotate(-22 230 150)"
                />
            </svg>

            <div class="heart-text">
                Sinä olet minulle tärkeä
            </div>

        </div>

    </main>

</body>
</html>
