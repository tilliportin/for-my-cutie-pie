<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kimaltava sydän</title>

    <style>
        * {
            box-sizing: border-box;
        }

   body {
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(
        to bottom,
        #fffafd,
        #fff3f8
    );

    overflow: hidden;
}

        .heart-container {
            position: relative;
            width: 340px;
            height: 310px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

       .heart {
    position: relative;
    width: 240px;
    height: 240px;

    background: linear-gradient(
        145deg,
        #ffd4e8 0%,
        #ffb8d8 35%,
        #ff99c8 70%,
        #ff86bf 100%
    );

    border: 5px solid #c85a8d;

    transform: rotate(-45deg);

    box-shadow:
        0 10px 25px rgba(0,0,0,0.15),
        0 20px 45px rgba(200,90,141,0.25),
        inset 8px 8px 15px rgba(255,255,255,0.7),
        inset -8px -8px 15px rgba(200,90,141,0.18);
        
        animation: glow 3.5s ease-in-out infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 240px;
    height: 240px;

    background: inherit;
    border: 5px solid #c85a8d;
    border-radius: 50%;
}

.heart::before {
    top: -120px;
    left: -5px;
    border-bottom-color: transparent;
}

.heart::after {
    left: 120px;
    top: -5px;
    border-left-color: transparent;
}

        .text {
    position: absolute;
    top: 48%;
    left: 50%;
    width: 220px;

    transform: translate(-50%, -50%);

    color: #ffffff;

    font-family: Georgia, "Times New Roman", serif;
    font-size: 24px;
    font-weight: normal;

    text-align: center;
    line-height: 1.4;

    text-shadow:
        0 1px 2px rgba(0,0,0,0.15),
        0 0 10px rgba(255,255,255,0.3);

    z-index: 5;
}

        .sparkle {
            position: absolute;
            z-index: 10;
            color: white;
            font-size: 26px;
            opacity: 0;
            text-shadow: 0 0 8px white;
            animation: twinkle 3s infinite;
        }

        .sparkle-1 {
            top: 5px;
            left: 35px;
        }

        .sparkle-2 {
            top: 45px;
            right: 20px;
            animation-delay: 0.8s;
        }

        .sparkle-3 {
            bottom: 45px;
            left: 20px;
            animation-delay: 1.6s;
        }

        .sparkle-4 {
            right: 45px;
            bottom: 20px;
            animation-delay: 2.2s;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.5) rotate(0deg);
            }

            50% {
                opacity: 1;
                transform: scale(1.2) rotate(20deg);
            }
        }

        @keyframes glow {
            0%, 100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.08);
            }
        }

        @media (max-width: 500px) {
            .heart-container {
                transform: scale(0.8);
            }
        }
    </style>
</head>

<body>

    <div class="heart-container">
        <span class="sparkle sparkle-1">✦</span>
        <span class="sparkle sparkle-2">✧</span>
        <span class="sparkle sparkle-3">✦</span>
        <span class="sparkle sparkle-4">✧</span>

        <div class="heart"></div>

        <div class="text">
            Sinä olet minulle tärkeä
        </div>
    </div>

</body>
</html>
